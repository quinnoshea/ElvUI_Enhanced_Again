name: Manual Version Bump

on:
  workflow_dispatch:
    inputs:
      part:
        description: Version segment to increment
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: version-bump-main
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Bump version and tag
        run: |
          set -euo pipefail

          git pull --ff-only origin main
          PART="${{ inputs.part }}"

          # Read current version from retail TOC
          CURRENT=$(sed -n 's/^## Version: //p' ElvUI_Enhanced.toc | tr -d '\r')
          echo "Current version: ${CURRENT}"

          if ! [[ "${CURRENT}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unexpected version format: ${CURRENT}" >&2
            exit 1
          fi

          # Bump the requested version segment
          IFS=. read -r MAJOR MINOR PATCH <<< "${CURRENT}"

          case "${PART}" in
            patch)
              PATCH=$((PATCH + 1))
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            *)
              echo "Unsupported version part: ${PART}" >&2
              exit 1
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: ${NEW_VERSION}"

          # Update both TOC files
          sed -i "s/## Version: ${CURRENT}/## Version: ${NEW_VERSION}/" ElvUI_Enhanced.toc
          sed -i "s/## Version: ${CURRENT}/## Version: ${NEW_VERSION}/" ElvUI_Enhanced_Wrath.toc

          # Commit and tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ElvUI_Enhanced.toc ElvUI_Enhanced_Wrath.toc
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin main
          git push origin "v${NEW_VERSION}"
