name: Retail PR Checks

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review

jobs:
  checks:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PR title format
        run: |
          set -euo pipefail
          TITLE="$(jq -r '.pull_request.title' "${GITHUB_EVENT_PATH}")"
          REGEX='^(fix|feat|chore|docs|refactor|test|build|ci|perf|style)(\([a-z0-9._/-]+\))?: .+'

          if [[ ! "${TITLE}" =~ ${REGEX} ]]; then
            echo "PR title does not match conventional format."
            echo "Expected: type(scope): summary"
            echo "Allowed types: fix, feat, chore, docs, refactor, test, build, ci, perf, style"
            echo "Current title: ${TITLE}"
            exit 1
          fi

      - name: Set up Lua 5.1
        uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.1"

      - name: Collect changed Lua files
        run: |
          set -euo pipefail
          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- '*.lua' \
            | while IFS= read -r file; do
                [[ -f "${file}" ]] && echo "${file}"
              done > /tmp/changed_lua_files.txt
          echo "Changed Lua files:"
          cat /tmp/changed_lua_files.txt || true

      - name: Lua syntax check
        run: |
          set -euo pipefail
          if [[ ! -s /tmp/changed_lua_files.txt ]]; then
            echo "No Lua files changed."
            exit 0
          fi

          while IFS= read -r file; do
            LUA_FILE="$file" lua -e 'assert(loadfile(os.getenv("LUA_FILE")))'
          done < /tmp/changed_lua_files.txt

      - name: Retail API guard
        run: |
          set -euo pipefail
          if [[ ! -s /tmp/changed_lua_files.txt ]]; then
            echo "No Lua files changed."
            exit 0
          fi

          mapfile -t lua_files < /tmp/changed_lua_files.txt
          ./.github/scripts/check-deprecated-apis.sh "${lua_files[@]}"
