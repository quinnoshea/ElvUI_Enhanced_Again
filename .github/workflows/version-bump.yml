name: Version Bump on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  actions: write

concurrency:
  group: version-bump-main
  cancel-in-progress: false

jobs:
  bump:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Bump version and tag
        run: |
          set -euo pipefail

          git pull --ff-only origin main

          # Read current version from retail TOC
          CURRENT=$(sed -n 's/^## Version: //p' ElvUI_Enhanced.toc | tr -d '\r')
          echo "Current version: ${CURRENT}"

          if ! [[ "${CURRENT}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unexpected version format: ${CURRENT}" >&2
            exit 1
          fi

          # Bump patch number
          IFS=. read -r MAJOR MINOR PATCH <<< "${CURRENT}"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "New version: ${NEW_VERSION}"
          echo "NEW_VERSION=${NEW_VERSION}" >> "${GITHUB_ENV}"

          # Update both TOC files
          sed -i "s/## Version: ${CURRENT}/## Version: ${NEW_VERSION}/" ElvUI_Enhanced.toc
          sed -i "s/## Version: ${CURRENT}/## Version: ${NEW_VERSION}/" ElvUI_Enhanced_Wrath.toc

          # Commit and tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ElvUI_Enhanced.toc ElvUI_Enhanced_Wrath.toc
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin main
          git push origin "v${NEW_VERSION}"

      - name: Trigger retail release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run main.yml --ref main -f tag="v${NEW_VERSION}"
