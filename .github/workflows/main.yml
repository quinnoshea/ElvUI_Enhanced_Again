name: Retail Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build retail zip
        id: package
        run: |
          set -euo pipefail
          ADDON_NAME="ElvUI_Enhanced"
          VERSION="${GITHUB_REF_NAME}"
          DIST_DIR="dist"
          PKG_ROOT="${DIST_DIR}/${ADDON_NAME}"

          mkdir -p "${PKG_ROOT}"
          rsync -a ./ "${PKG_ROOT}/" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "NOTES/" \
            --exclude ".claude/" \
            --exclude ".code/" \
            --exclude ".plan" \
            --exclude "dist/" \
            --exclude "CLAUDE.md*" \
            --exclude "GEMINI.md" \
            --exclude "*.bak" \
            --exclude "*.md"

          (cd "${DIST_DIR}" && zip -r "../${ADDON_NAME}-${VERSION}.zip" "${ADDON_NAME}")
          echo "artifact=${ADDON_NAME}-${VERSION}.zip" >> "${GITHUB_OUTPUT}"

      - name: Generate checksum
        run: sha256sum "${{ steps.package.outputs.artifact }}" > "${{ steps.package.outputs.artifact }}.sha256"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.artifact }}
            ${{ steps.package.outputs.artifact }}.sha256
          generate_release_notes: true

      - name: Upload to CurseForge
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CURSEFORGE_TOKEN }}
          project_id: 1490221
          game_endpoint: wow
          file_path: ${{ steps.package.outputs.artifact }}
          display_name: ElvUI Enhanced (Yet) Again ${{ github.ref_name }}
          game_versions: "12.0.1"
          release_type: release
          changelog: "See release notes at https://github.com/bloqaudio/ElvUI_Enhanced_Yet_Again/releases/tag/${{ github.ref_name }}"
          changelog_type: text
