name: Retail Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v4.3.9
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: retail-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_REF }}

      - name: Build retail zip
        id: package
        run: |
          set -euo pipefail
          ADDON_NAME="ElvUI_Enhanced"
          VERSION="${RELEASE_TAG}"
          DIST_DIR="dist"
          PKG_ROOT="${DIST_DIR}/${ADDON_NAME}"

          mkdir -p "${PKG_ROOT}"
          rsync -a ./ "${PKG_ROOT}/" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "NOTES/" \
            --exclude ".claude/" \
            --exclude ".code/" \
            --exclude ".plan" \
            --exclude "CLAUDE.md*" \
            --exclude "GEMINI.md" \
            --exclude "*.bak" \
            --exclude "*.md"

          (cd "${DIST_DIR}" && zip -r "../${ADDON_NAME}-${VERSION}.zip" "${ADDON_NAME}")
          echo "artifact=${ADDON_NAME}-${VERSION}.zip" >> "${GITHUB_OUTPUT}"

      - name: Generate checksum
        run: sha256sum "${{ steps.package.outputs.artifact }}" > "${{ steps.package.outputs.artifact }}.sha256"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            ${{ steps.package.outputs.artifact }}
            ${{ steps.package.outputs.artifact }}.sha256
          generate_release_notes: true

      - name: Upload to CurseForge
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CURSEFORGE_TOKEN }}
          project_id: 1490221
          game_endpoint: wow
          file_path: ${{ steps.package.outputs.artifact }}
          display_name: ElvUI Enhanced (Yet) Again ${{ env.RELEASE_TAG }}
          game_versions: "12.0.5"
          release_type: release
          changelog: "See release notes at https://github.com/bloqaudio/ElvUI_Enhanced_Yet_Again/releases/tag/${{ env.RELEASE_TAG }}"
          changelog_type: text
