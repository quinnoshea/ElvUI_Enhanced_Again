name: Retail Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build retail zip
        id: package
        run: |
          set -euo pipefail
          ADDON_NAME="ElvUI_Enhanced_Again"
          VERSION="${GITHUB_REF_NAME}"
          DIST_DIR="dist"
          PKG_ROOT="${DIST_DIR}/${ADDON_NAME}"

          mkdir -p "${PKG_ROOT}"
          rsync -a ./ "${PKG_ROOT}/" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "NOTES/" \
            --exclude ".claude/" \
            --exclude ".code/" \
            --exclude ".plan" \
            --exclude "CLAUDE.md*" \
            --exclude "GEMINI.md" \
            --exclude "*.bak" \
            --exclude "*.md"

          (cd "${DIST_DIR}" && zip -r "../${ADDON_NAME}-${VERSION}.zip" "${ADDON_NAME}")
          echo "artifact=${ADDON_NAME}-${VERSION}.zip" >> "${GITHUB_OUTPUT}"

      - name: Generate checksum
        run: sha256sum "${{ steps.package.outputs.artifact }}" > "${{ steps.package.outputs.artifact }}.sha256"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.artifact }}
            ${{ steps.package.outputs.artifact }}.sha256
          generate_release_notes: true
