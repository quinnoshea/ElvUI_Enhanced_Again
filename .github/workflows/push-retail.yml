name: Retail Push Checks

on:
  push:
    branches:
      - "**"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Lua 5.1
        uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.1"

      - name: Lua syntax check (all files)
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            LUA_FILE="$file" lua -e 'assert(loadfile(os.getenv("LUA_FILE")))'
          done < <(find . -type f -name '*.lua' -not -path './.git/*' -print0)
